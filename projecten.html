    <script>
        // Fallback class verwijderen
        document.documentElement.classList.remove('no-js');

        (function () {
            // ======= PROJECT SLIDER =======
            document.querySelectorAll('.project-slider').forEach(initProjectSlider);

            function initProjectSlider(slider) {
            const track = slider.querySelector('.ps-track');
            const originalSlides = Array.from(slider.querySelectorAll('.ps-slide'));
            const prevBtn = slider.querySelector('.ps-btn-prev');
            const nextBtn = slider.querySelector('.ps-btn-next');

            if (!track || !originalSlides.length) return;

            let slidesPerView = getSlidesPerView();
            let cloneCount = getCloneCount();
            const realSlideCount = originalSlides.length;

            function getSlidesPerView() {
                const w = window.innerWidth;
                if (w <= 640) return 1;
                if (w <= 1024) return 2;
                return 3;
            }

            function getCloneCount() {
                return Math.min(slidesPerView, originalSlides.length);
            }

            // Clone slides for infinite loop
            function setupInfiniteSlides() {
                // Remove any existing clones
                const existingClones = track.querySelectorAll('.ps-slide-clone');
                existingClones.forEach(clone => clone.remove());

                // Clone last slides and prepend
                cloneCount = getCloneCount();

                for (let i = 0; i < cloneCount; i++) {
                    const clone = originalSlides[originalSlides.length - 1 - i].cloneNode(true);
                    clone.classList.add('ps-slide-clone');
                    track.insertBefore(clone, track.firstChild);
                }

                // Clone first slides and append
                for (let i = 0; i < cloneCount; i++) {
                    const clone = originalSlides[i].cloneNode(true);
                    clone.classList.add('ps-slide-clone');
                    track.appendChild(clone);
                }
            }

            setupInfiniteSlides();
            const allSlides = Array.from(track.querySelectorAll('.ps-slide'));
            let index = cloneCount; // Start at the first real slide (after prepended clones)
            let isJumping = false;

            function updateButtons() {
                prevBtn.disabled = false;
                nextBtn.disabled = false;
            }

            function update(instant = false) {
                if (instant) {
                    track.style.transition = 'none';
                } else {
                    track.style.transition = 'transform 0.4s ease';
                }
                
                const slideW = (() => {
                    const s = track.querySelectorAll('.ps-slide');
                    if (s.length < 2) return s[0]?.getBoundingClientRect().width || 0;
                    return s[1].offsetLeft - s[0].offsetLeft; // echte stap incl padding/gap
                })();

                track.style.transform = `translate3d(${-index * slideW}px,0,0)`;
                updateButtons();
            }

            function go(delta) {
                if (isJumping) return;

                const newIndex = index + delta;
                const endBoundary = cloneCount + realSlideCount;
                const startBoundary = cloneCount;

                index = newIndex;
                update(false);

                // Binnen de echte range? klaar.
                if (index >= startBoundary && index < endBoundary) return;

                isJumping = true;

                const onDone = (e) => {
                    if (e.propertyName !== 'transform') return;
                    track.removeEventListener('transitionend', onDone);

                    // rechts voorbij einde
                    if (index >= endBoundary) {
                    const overflow = index - endBoundary;
                    index = cloneCount + overflow;
                    }

                    // links voorbij begin
                    if (index < startBoundary) {
                    const underflow = index - startBoundary; // negatief
                    index = cloneCount + realSlideCount + underflow;
                    }

                    update(true);           // spring zonder animatie
                    void track.offsetHeight; // reflow
                    isJumping = false;
                };

                track.addEventListener('transitionend', onDone, { once: true });
            }

            prevBtn?.addEventListener('click', () => go(-1));
            nextBtn?.addEventListener('click', () => go(1));

            let startX = 0, isDown = false;
            slider.addEventListener('pointerdown', (e) => { isDown = true; startX = e.clientX; });
            window.addEventListener('pointerup', (e) => {
                if (!isDown) return;
                const dx = e.clientX - startX;
                if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
                isDown = false;
            });

            window.addEventListener('resize', () => {
                const newSpv = getSlidesPerView();
                if (newSpv !== slidesPerView) {
                    slidesPerView = newSpv;
                    setupInfiniteSlides();
                    const newAllSlides = Array.from(track.querySelectorAll('.ps-slide'));
                    allSlides.length = 0;
                    allSlides.push(...newAllSlides);
                    index = cloneCount;
                }
                update();
            });

            update();
            }

            // ======= LIGHTBOX (per project meerdere foto's) =======
            const lightbox = document.getElementById('lightbox');
            const imgEl = document.getElementById('lb-image');
            const capEl = document.getElementById('lb-caption');
            const btnPrev = lightbox?.querySelector('.lb-prev');
            const btnNext = lightbox?.querySelector('.lb-next');
            const btnClose = lightbox?.querySelector('.lb-close');

            let current = 0;
            let items = []; // [{src, alt}...]

            function openLightbox(list, startIndex = 0) {
                items = list;
                current = startIndex;
                render();
                lightbox.hidden = false;
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.hidden = true;
                document.body.style.overflow = '';
                items = [];
            }

            function render() {
                const it = items[current];
                if (!it) return;
                imgEl.src = it.src;
                imgEl.alt = it.alt || '';
                capEl.textContent = it.alt || '';
                // prefetch buren (kleine optimalisatie)
                const next = new Image(), prev = new Image();
                next.src = items[(current + 1) % items.length]?.src || '';
                prev.src = items[(current - 1 + items.length) % items.length]?.src || '';
            }

            function next() {
                current = (current + 1) % items.length;
                render();
            }

            function prev() {
                current = (current - 1 + items.length) % items.length;
                render();
            }

            // Klik op projectkaart: pak beelden uit gekoppelde hidden gallery
            document.addEventListener('click', (e) => {
            const link = e.target.closest('.ps-card[data-gallery]');
            if (!link) return;

            e.preventDefault();
            const sel = link.getAttribute('data-gallery');
            const gal = document.querySelector(sel);
            if (!gal) return;

            const imgs = Array.from(gal.querySelectorAll('img'));
            const list = imgs.map(img => ({ src: img.getAttribute('src'), alt: img.getAttribute('alt') || '' }));

            // start op 0, of gebruik thumb-match (optioneel)
            openLightbox(list, 0);
            });

            // Bediening
            btnNext?.addEventListener('click', next);
            btnPrev?.addEventListener('click', prev);
            btnClose?.addEventListener('click', closeLightbox);

            // Sluiten op klik buiten beeld (overlay)
            lightbox?.addEventListener('click', (e) => {
            const clickedInside = e.target.closest('.lb-stage') || e.target.closest('.lb-nav') || e.target.closest('.lb-close');
            if (!clickedInside) closeLightbox();
            });

            // Keyboard
            window.addEventListener('keydown', (e) => {
            if (lightbox?.hidden) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') next();
            if (e.key === 'ArrowLeft') prev();
            });

            // Swipe op lightbox
            let sx = 0, down = false;
            lightbox?.addEventListener('pointerdown', (e) => { down = true; sx = e.clientX; });
            window.addEventListener('pointerup', (e) => {
            if (!down || lightbox?.hidden) return;
            const dx = e.clientX - sx;
            if (Math.abs(dx) > 40) (dx < 0 ? next() : prev());
            down = false;
            });
        })();
    </script>
