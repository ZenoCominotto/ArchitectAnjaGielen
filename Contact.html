<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Architect Anja Gielen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <img src="Pictures/Logo-juist-scherp-2.png" alt="Logo" class="logo">
            <nav>
                <a href="index.html">Home</a>
                <a href="projecten.html">Projecten</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <h1 class="page-title">Contact</h1>

        <section class="contact-info">
            <p>Neem gerust contact met me op voor meer informatie of een afspraak.</p>
            <div class="contact-details" aria-label="Contactgegevens">
                <article class="contact-detail">
                    <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
                    <div>
                        <h2>Adres</h2>
                        <address>
                            De Scheuten 12<br>
                            3971 Heppen
                        </address>
                    </div>
                </article>

                <article class="contact-detail">
                    <i class="fa-solid fa-phone" aria-hidden="true"></i>
                    <div>
                        <h2>Telefoon</h2>
                        <a href="tel:+32476473248">+32 476 47 32 48</a>
                    </div>
                </article>

                <article class="contact-detail">
                    <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                    <div>
                        <h2>Email</h2>
                        <a href="mailto:anja@architectgielen.be">anja@architectgielen.be</a>
                    </div>
                </article>
            </div>
        </section>

        <section class="socials">
            <h2>Volg mij op</h2>
            <a href="https://www.instagram.com/jouwaccount" target="_blank">
                <i class="fab fa-instagram fa-2x"></i>
            </a>
            <a href="https://www.facebook.com/jouwaccount" target="_blank">
                <i class="fab fa-facebook fa-2x"></i>
            </a>
        </section>

        <section class="contact-form">
            <h2>Stuur me een bericht</h2>
            <form id="contactForm">
                <div class="form-honeypot" aria-hidden="true">
                    <label for="website">Website</label>
                    <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
                </div>
                <input type="text" name="name" placeholder="Naam" required>
                <input type="email" name="email" placeholder="E-mail" required>
                <textarea name="message" placeholder="Uw bericht..." required></textarea>
                <input type="hidden" name="captchaToken" value="">
                <button type="submit">Verstuur</button>
            </form>
            <p id="formMessage"></p>


        </section>
        <section class="map-section">
            <div class="map-container">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2505.070953770935!2d5.233777675770996!3d51.10715103986495!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c131b454396987%3A0xb3c780805822fada!2sArchitect%20Anja%20Gielen!5e0!3m2!1snl!2sbe!4v1773087260848!5m2!1snl!2sbe" 
                    width="600" 
                    height="450" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Architect Anja Gielen</p>
    </footer>
    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e){
            e.preventDefault();
            const formData = {
                name: e.target.name.value,
                email: e.target.email.value,
                message: e.target.message.value,
                website: e.target.website.value,
                captchaToken: e.target.captchaToken.value
            };

            try {
                const result = document.getElementById('formMessage');
                result.textContent = 'Verzenden...';
                result.style.color = '#fff';

                const functionUrl = '/.netlify/functions/sendEmail';
                const response = await fetch(functionUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                let responseData;
                try {
                    const text = await response.text();
                    responseData = text ? JSON.parse(text) : {};
                } catch (parseErr) {
                    result.textContent = 'Fout bij lezen van server antwoord. Status: ' + response.status;
                    result.style.color = 'red';
                    return;
                }

                if(response.ok){
                    result.textContent = responseData.message || 'Bericht verzonden!';
                    result.style.color = 'green';
                    e.target.reset();
                } else {
                    result.textContent = responseData.message || 'Er is een fout opgetreden. Probeer het later opnieuw.';
                    result.style.color = 'red';
                }
            } catch (err) {
                const result = document.getElementById('formMessage');
                let errorMsg = 'Netwerkfout: ' + err.message;
                
                // Provide more specific error messages
                if (err.message.includes('Failed to fetch')) {
                    errorMsg = 'Kan niet verbinden met server. Controleer of de functie bestaat en of je online bent.';
                } else if (err.message.includes('NetworkError')) {
                    errorMsg = 'Netwerkfout. Controleer je internetverbinding.';
                }
                
                result.textContent = errorMsg;
                result.style.color = 'red';
            }
        });
    </script>

</body>
</html>
